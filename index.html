<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Finance Maneger</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="filter-form">
      <select id="filter-category">
        <option value="">All categories</option>
        <option value="Transport">Transport</option>
        <option value="Food">Food</option>
        <option value="Clothes">Clothes</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Salary">Salary</option>
        <option value="Freelance">Freelance</option>
        <option value="Bonus">Bonus</option>
      </select>
      <input type="date" id="filter-date-from" />
      <input type="date" id="filter-date-to" />
      <button id="filter-btn">Filter</button>
      <button id="reset-filter-btn">Reset</button>
      <button id="show-stats-btn">Stats</button>
    </div>

    <!-- <div id="statistics"></div> -->

    <div style="position: relative; width: fit-content; margin: 0 auto">
      <div class="add-form">
        <input type="text" id="amount" placeholder="Amount" />
        <select id="Income-exp">
          <option value="" disabled selected hidden></option>
          <option value="Expenses">Expenses</option>
          <option value="Income">Income</option>
        </select>
        <select id="categories"></select>
        <input type="date" id="start" name="trip-start" />
        <button id="add">Add</button>
      </div>

      <div class="two-containers">
        <div id="container"></div>
      </div>

      <div id="statistics-modal">
        <button id="close-stats-btn" style="float: right">✖</button>
        <div id="statistics"></div>
        <canvas id="expensesChart" width="200" height="200"></canvas>
      </div>

      <div class="balance-div">
        <div id="balance">Balance: £0.00</div>
      </div>
    </div>

    

    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </body>
</html>
